syntax = "proto3";

package library.v1;

import "google/protobuf/timestamp.proto";
import "library/v1/common.proto";

// Book catalog (title-level) and physical copies.

message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  string publisher = 5;
  int32 published_year = 6;
  string category = 7;
  string description = 8;
  int32 total_copies = 9;      // convenience: number of physical copies
  int32 available_copies = 10; // convenience: copies currently available
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message BookCopy {
  string id = 1;
  string book_id = 2;
  string barcode = 3;
  string condition = 4; // "new" | "good" | "worn" | "damaged"
  string status = 5;    // "available" | "borrowed" | "lost" | "maintenance"
  google.protobuf.Timestamp created_at = 6;
}

message CreateBookRequest {
  string title = 1;
  string author = 2;
  string isbn = 3;
  string publisher = 4;
  int32 published_year = 5;
  string category = 6;
  string description = 7;
}

message UpdateBookRequest {
  string id = 1;
  // Only provided fields are updated (optional semantics handled server-side).
  string title = 2;
  string author = 3;
  string isbn = 4;
  string publisher = 5;
  int32 published_year = 6;
  string category = 7;
  string description = 8;
}

message GetBookRequest {
  string id = 1;
}

message ListBooksRequest {
  string search = 1; // matches title/author (trigram); empty = all
  PageParams page = 2;
}

message ListBooksResponse {
  repeated Book books = 1;
  PageInfo page = 2;
}

message AddCopyRequest {
  string book_id = 1;
  string barcode = 2;
  string condition = 3;
}

message ListCopiesRequest {
  string book_id = 1;
}

message ListCopiesResponse {
  repeated BookCopy copies = 1;
}

service BookService {
  rpc CreateBook(CreateBookRequest) returns (Book);
  rpc UpdateBook(UpdateBookRequest) returns (Book);
  rpc GetBook(GetBookRequest) returns (Book);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc AddCopy(AddCopyRequest) returns (BookCopy);
  rpc ListCopies(ListCopiesRequest) returns (ListCopiesResponse);
}
