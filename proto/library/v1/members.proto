syntax = "proto3";

package library.v1;

import "google/protobuf/timestamp.proto";
import "library/v1/common.proto";

// Library members (borrowers).

message Member {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string address = 6;
  string status = 7; // "active" | "suspended"
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateMemberRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
}

message UpdateMemberRequest {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string address = 6;
  string status = 7;
}

message GetMemberRequest {
  string id = 1;
}

message ListMembersRequest {
  string search = 1; // matches name/email; empty = all
  PageParams page = 2;
}

message ListMembersResponse {
  repeated Member members = 1;
  PageInfo page = 2;
}

service MemberService {
  rpc CreateMember(CreateMemberRequest) returns (Member);
  rpc UpdateMember(UpdateMemberRequest) returns (Member);
  rpc GetMember(GetMemberRequest) returns (Member);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
}
