[project]
name = "neighborhood-library"
version = "0.1.0"
description = "Neighborhood Library Service — gRPC core + REST gateway over PostgreSQL"
requires-python = ">=3.12"
dependencies = [
    # Web / API
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "email-validator>=2.2",
    # gRPC
    "grpcio>=1.68",
    "grpcio-tools>=1.68",
    "protobuf>=5.28",
    # Database
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30",
    "alembic>=1.14",
    # Security
    "argon2-cffi>=23.1",
    "pyjwt>=2.10",
    # Rate limiting
    "slowapi>=0.1.9",
    # Logging
    "structlog>=24.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.7",
    "mypy>=1.13",
    "pip-audit>=2.7",
    "pytest-cov>=5.0",
    "locust>=2.30",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]
# Generated gRPC/Protobuf stubs are not hand-written; don't lint them.
extend-exclude = ["src/library/v1"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "ASYNC"]

[tool.ruff.lint.per-file-ignores]
# Alembic migrations are largely autogenerated; long DDL lines are expected.
"alembic/versions/*" = ["E501", "I001"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection markers are meant to be called in argument defaults.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Header",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Security",
]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.setuptools.package-data]
"*" = ["*.proto"]
